<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content=width=device-width,initial-scale=1.0><title>ease-modern-card-hover</title><link rel=stylesheet href=style.css></head><body><div class=container><h1>modern-card-hover</h1><p class=subtitle>Click to toggle animation</p><div class=demo-box><div class=anim-target id=t></div></div><button class=trigger id=b>Toggle</button></div><script>document.getElementById('b').addEventListener('click',function(){var t=document.getElementById('t');t.classList.toggle('active');t.style.setProperty('--state',t.classList.contains('active')?'1':'0');});</script></body></html>
