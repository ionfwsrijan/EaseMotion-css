<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-typewriter - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Typewriter</h1>
    <div class="typewriter">
      <span id="typewriterText"></span><span class="cursor"></span>
    </div>
  </div>
  <script>
    const phrases = ['EaseMotion makes typing smooth.', 'Staggered character reveal.', 'Delete and retype loop.'];
    let idx = 0, charIdx = 0, deleting = false;
    const el = document.getElementById('typewriterText');
    function type() {
      const current = phrases[idx];
      if (!deleting) {
        el.textContent = current.slice(0, charIdx + 1);
        charIdx++;
        if (charIdx === current.length) { deleting = true; setTimeout(type, 1500); return; }
        setTimeout(type, 60 + Math.random() * 40);
      } else {
        el.textContent = current.slice(0, charIdx - 1);
        charIdx--;
        if (charIdx === 0) { deleting = false; idx = (idx + 1) % phrases.length; setTimeout(type, 400); return; }
        setTimeout(type, 30);
      }
    }
    type();
  </script>
</body>
</html>
