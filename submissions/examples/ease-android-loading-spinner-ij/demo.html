<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Android Loading Spinner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Android-Style Loading Spinner</h1>

<div class="spinner-group">

<div class="spinner-label">
<div class="spinner"></div>
<span>Default</span>
</div>

<div class="spinner-label">
<div class="spinner small"></div>
<span>Small</span>
</div>

<div class="spinner-label">
<div class="spinner large"></div>
<span>Large</span>
</div>

</div>

<div class="variants">

<div class="spinner-label">
<div class="spinner" style="border-top-color: #ff6b6b;"></div>
<span>Custom Color</span>
</div>

<div class="spinner-label">
<div class="spinner" style="border-top-color: #ffd93d; --spin-duration: 0.6s;"></div>
<span>Fast Spin</span>
</div>

</div>

<h2 style="margin: 40px 0 20px; color: var(--spinner-color);">Loading Bar</h2>

<div class="loading-bar">
<div class="fill"></div>
</div>

<p class="loading-text">Loading content, please wait...</p>

</div>

</body>
</html>
