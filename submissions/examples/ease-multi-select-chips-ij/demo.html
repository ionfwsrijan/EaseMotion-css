<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi Select Chips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="msc-container">
    <h1>Multi Select Chips</h1>
    <p>Click a chip to toggle its selected state.</p>

    <div class="msc-chips-list">
      <button type="button" class="msc-chip">
        <span class="msc-check-icon">✓</span>
        React
      </button>
      <button type="button" class="msc-chip">
        <span class="msc-check-icon">✓</span>
        Vue
      </button>
      <button type="button" class="msc-chip">
        <span class="msc-check-icon">✓</span>
        Angular
      </button>
      <button type="button" class="msc-chip">
        <span class="msc-check-icon">✓</span>
        Svelte
      </button>
      <button type="button" class="msc-chip">
        <span class="msc-check-icon">✓</span>
        Solid
      </button>
      <button type="button" class="msc-chip">
        <span class="msc-check-icon">✓</span>
        Qwik
      </button>
      <button type="button" class="msc-chip">
        <span class="msc-check-icon">✓</span>
        Alpine
      </button>
      <button type="button" class="msc-chip">
        <span class="msc-check-icon">✓</span>
        Lit
      </button>
    </div>
  </main>

  <script>
    document.querySelectorAll('.msc-chip').forEach(chip => {
      chip.addEventListener('click', () => chip.classList.toggle('msc-selected'));
    });
  </script>
</body>
</html>
