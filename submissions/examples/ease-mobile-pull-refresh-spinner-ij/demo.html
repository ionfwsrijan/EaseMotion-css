<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-mobile-pull-refresh-spinner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Pull Refresh Spinner</h1>
    <p class="subtitle">Drag down on the list area</p>
    <div class="refresh-area" id="refreshArea">
      <div class="spinner-track">
        <div class="spinner" id="spinner"></div>
      </div>
      <p class="hint">Pull down to refresh</p>
      <div class="content-list">
        <div class="list-item">Item 1 — Latest updates</div>
        <div class="list-item">Item 2 — Unread messages</div>
        <div class="list-item">Item 3 — Pending tasks</div>
        <div class="list-item">Item 4 — Recent activity</div>
      </div>
    </div>
    <p class="status" id="status">Ready</p>
  </div>
  <script>
    const area = document.getElementById('refreshArea');
    const spinner = document.getElementById('spinner');
    const status = document.getElementById('status');
    let startY = 0, pulling = false, pulled = false;
    area.addEventListener('pointerdown', function(e) {
      startY = e.clientY;
      pulling = true;
      status.textContent = 'Pulling...';
    });
    document.addEventListener('pointermove', function(e) {
      if (!pulling) return;
      const dy = Math.max(0, e.clientY - startY);
      const progress = Math.min(dy / 150, 1);
      spinner.style.setProperty('--pull-progress', progress);
      spinner.classList.toggle('active', progress > 0);
      area.style.transform = 'translateY(' + (dy * 0.3) + 'px)';
      pulled = progress >= 1;
      status.textContent = pulled ? 'Release to refresh' : 'Pull more...';
    });
    document.addEventListener('pointerup', function() {
      if (!pulling) return;
      pulling = false;
      area.style.transform = '';
      if (pulled) {
        status.textContent = 'Refreshing...';
        spinner.classList.add('refreshing');
        setTimeout(function() {
          spinner.classList.remove('refreshing');
          spinner.style.setProperty('--pull-progress', 0);
          status.textContent = 'Refreshed!';
          pulled = false;
        }, 1500);
      } else {
        spinner.style.setProperty('--pull-progress', 0);
        spinner.classList.remove('active');
        status.textContent = 'Ready';
      }
    });
  </script>
</body>
</html>
