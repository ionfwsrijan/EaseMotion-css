<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Attachment Preview Demo (ij)</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ease-color-bg:           #0f172a;
      --ease-color-surface:      #1e293b;
      --ease-color-text:         #f8fafc;
      --ease-color-muted:        #64748b;
      --ease-color-neutral-200:  #334155;
      --ease-font-sans:          'Inter', system-ui, -apple-system, sans-serif;
      --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --ease-color-bg:           #f1f5f9;
        --ease-color-surface:      #ffffff;
        --ease-color-text:         #0f172a;
        --ease-color-muted:        #64748b;
        --ease-color-neutral-200:  #e2e8f0;
        --ease-shadow-lg:          0 10px 15px -3px rgba(0,0,0,0.08);
      }
    }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .upload-area {
      background: var(--ease-color-surface);
      border: 2px dashed var(--ease-color-neutral-200);
      border-radius: 1rem;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
      max-width: 520px;
      margin-bottom: 2rem;
    }

    .upload-area:hover {
      border-color: #6c63ff;
      background: color-mix(in srgb, var(--ease-color-surface) 97%, #6c63ff);
    }

    .upload-area p {
      color: var(--ease-color-muted);
      font-size: 0.9rem;
    }

    .upload-area .icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .preview-list {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
  </style>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>File Attachment Preview</h1>
    <p>Upload files and watch them slide in with a smooth animation. Hover over a card to reveal the remove button.</p>
  </header>

  <div class="upload-area" id="uploadArea">
    <div class="icon">📎</div>
    <p>Click or drop files here</p>
  </div>

  <div class="preview-list" id="previewList"></div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const previewList = document.getElementById('previewList');

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function addFileCard(file) {
      const card = document.createElement('div');
      card.className = 'fap-card';

      const info = document.createElement('div');
      info.className = 'fap-info';

      const name = document.createElement('span');
      name.className = 'fap-name';
      name.textContent = file.name;

      const size = document.createElement('span');
      size.className = 'fap-size';
      size.textContent = formatSize(file.size);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'fap-remove';
      removeBtn.textContent = 'Remove';
      removeBtn.addEventListener('click', () => {
        card.remove();
      });

      info.appendChild(name);
      info.appendChild(size);
      card.appendChild(info);
      card.appendChild(removeBtn);
      previewList.appendChild(card);

      // Trigger slide-in
      requestAnimationFrame(() => {
        card.classList.add('fap-visible');
      });
    }

    uploadArea.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;
      input.addEventListener('change', () => {
        for (const file of input.files) {
          addFileCard(file);
        }
      });
      input.click();
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#6c63ff';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '';
      for (const file of e.dataTransfer.files) {
        addFileCard(file);
      }
    });
  </script>
</body>
</html>
