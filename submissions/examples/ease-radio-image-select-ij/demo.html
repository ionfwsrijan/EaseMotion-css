<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content=width=device-width,initial-scale=1.0><title>ease-radio-image-select</title><link rel=stylesheet href=style.css></head><body><div class=container><h1>radio image select</h1><p class=subtitle>Click to toggle</p><div class=demo-box><div class=anim-target id=t></div></div><button class=trigger id=b>Toggle</button></div><script>var t=document.getElementById('t');var b=document.getElementById('b');var a=false;b.addEventListener('click',function(){a=!a;t.classList.toggle('active',a);});</script></body></html>
