<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidebar Collapse Icon Demo (ij)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page-header {
      text-align: center;
      padding: 2rem 1.5rem 0;
    }

    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .page-header p {
      color: #64748b;
      font-size: 0.95rem;
    }

    .demo-layout {
      flex: 1;
      display: flex;
      padding: 1.5rem;
      gap: 1.5rem;
    }

    .demo-content {
      flex: 1;
      background: #ffffff;
      border-radius: 1rem;
      border: 1px solid #e2e8f0;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 0.95rem;
    }
  </style>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Sidebar Collapse Icon</h1>
    <p>Click the toggle button to collapse the sidebar. Icons remain visible while labels fade out.</p>
  </header>

  <div class="demo-layout">
    <aside class="sci-sidebar" id="sidebar">
      <div class="sci-header">
        <span class="sci-brand-icon">&#9670;</span>
        <span class="sci-label">AppName</span>
        <button class="sci-toggle" id="toggleBtn" aria-label="Toggle sidebar">&#9664;</button>
      </div>

      <nav class="sci-nav">
        <a href="#" class="sci-nav-item">
          <span class="sci-icon">&#8962;</span>
          <span class="sci-label">Dashboard</span>
        </a>
        <a href="#" class="sci-nav-item">
          <span class="sci-icon">&#128269;</span>
          <span class="sci-label">Search</span>
        </a>
        <a href="#" class="sci-nav-item">
          <span class="sci-icon">&#9881;</span>
          <span class="sci-label">Settings</span>
        </a>
        <a href="#" class="sci-nav-item">
          <span class="sci-icon">&#9993;</span>
          <span class="sci-label">Messages</span>
        </a>
        <a href="#" class="sci-nav-item">
          <span class="sci-icon">&#128101;</span>
          <span class="sci-label">Users</span>
        </a>
      </nav>
    </aside>

    <main class="demo-content">
      <span>Main content area</span>
    </main>
  </div>

  <script>
    document.getElementById("toggleBtn").addEventListener("click", function () {
      document.getElementById("sidebar").classList.toggle("sci-collapsed");
    });
  </script>

</body>
</html>
