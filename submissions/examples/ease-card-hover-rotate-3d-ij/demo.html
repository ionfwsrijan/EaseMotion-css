<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Hover Rotate 3D - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-card-hover-rotate-3d">
    <h2>3D Hover Rotate Card</h2>
    <p>Hover over the card to see the 3D rotation effect</p>
    <div class="card-scene">
      <div class="card-3d">
        <div class="card-face card-front">
          <div class="card-icon">✦</div>
          <h3>EaseMotion</h3>
          <p>Hover to rotate</p>
        </div>
        <div class="card-face card-back">
          <h3>Pure CSS</h3>
          <p>3D perspective transform</p>
        </div>
      </div>
    </div>
    <p class="hint">Move your cursor over the card</p>
  </div>
</body>
</html>
